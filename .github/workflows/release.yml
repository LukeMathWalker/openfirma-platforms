name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BAZELISK_VERSION: 1.28.1
  CARGO_TERM_COLOR: always
  NODE_VERSION: 24.16.0
  PROTOC_GEN_PROST_VERSION: 0.5.0
  PROTOC_GEN_TONIC_VERSION: 0.5.0

jobs:
  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install Bazelisk
        shell: bash
        run: |
          npm install -g @bazel/bazelisk@$BAZELISK_VERSION --registry=https://registry.npmjs.org/
          bazel version

      - name: Validate Bazel module
        run: bazel build //...

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dispatch-${GITHUB_RUN_ID}"
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package module archive
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          name="openfirma-platforms-${VERSION}"
          git archive --format=tar --prefix="${name}/" HEAD | gzip -n > "dist/${name}.tar.gz"
          (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openfirma-platforms
          path: dist/openfirma-platforms-*
          if-no-files-found: error

  prost-plugins:
    name: Prost Plugins (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest, windows-2025]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          cache: false
          rustflags: ""

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dispatch-${GITHUB_RUN_ID}"
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build plugins
        shell: bash
        run: |
          install_root="$PWD/.plugin-install"
          cargo install --locked --root "$install_root" --version "$PROTOC_GEN_PROST_VERSION" protoc-gen-prost
          cargo install --locked --root "$install_root" --version "$PROTOC_GEN_TONIC_VERSION" protoc-gen-tonic

      - name: Package plugins (unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          host_triple="$(rustc -vV | awk '/^host:/ { print $2 }')"
          name="openfirma-prost-plugins-${VERSION}-${host_triple}"
          mkdir -p "dist/${name}/bin"
          cp ".plugin-install/bin/protoc-gen-prost" "dist/${name}/bin/protoc-gen-prost"
          cp ".plugin-install/bin/protoc-gen-tonic" "dist/${name}/bin/protoc-gen-tonic"
          chmod 0555 "dist/${name}/bin/protoc-gen-prost" "dist/${name}/bin/protoc-gen-tonic"
          tar -czf "dist/${name}.tar.gz" -C dist "$name"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")
          else
            (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")
          fi

      - name: Package plugins (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $hostTriple = (rustc -vV | Select-String '^host:').ToString().Split(' ', 2)[1]
          $name = "openfirma-prost-plugins-$($env:VERSION)-$hostTriple"
          New-Item -ItemType Directory -Force -Path "dist/$name/bin" | Out-Null
          Copy-Item ".plugin-install/bin/protoc-gen-prost.exe" "dist/$name/bin/protoc-gen-prost.exe"
          Copy-Item ".plugin-install/bin/protoc-gen-tonic.exe" "dist/$name/bin/protoc-gen-tonic.exe"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip" -Force
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$name.zip").Hash.ToLower()
          "$hash  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openfirma-prost-plugins-${{ matrix.runner }}
          path: dist/openfirma-prost-plugins-*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push'
    needs: [package, prost-plugins]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0 # zizmor: ignore[superfluous-actions]
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
