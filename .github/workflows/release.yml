name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BAZELISK_VERSION: 1.28.1
  NODE_VERSION: 24.16.0

jobs:
  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install Bazelisk
        shell: bash
        run: |
          npm install -g @bazel/bazelisk@$BAZELISK_VERSION --registry=https://registry.npmjs.org/
          bazel version

      - name: Validate Bazel module
        run: bazel build //...

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dispatch-${GITHUB_RUN_ID}"
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package module archive
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          name="openfirma-platforms-${VERSION}"
          git archive --format=tar --prefix="${name}/" HEAD | gzip -n > "dist/${name}.tar.gz"
          (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openfirma-platforms
          path: dist/openfirma-platforms-*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push'
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0 # zizmor: ignore[superfluous-actions]
        with:
          files: dist/openfirma-platforms-*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
